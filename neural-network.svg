<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="ngGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#161B22" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="900" height="220" rx="8" fill="#0D1117"/>
  <rect width="900" height="220" rx="8" fill="url(#ngGrid)" opacity="0.45"/>

  <!-- ============ EDGES (agent <-> agent communication) ============ -->
  <g stroke="#21262D" stroke-width="1.2" fill="none">
    <path id="edge1" d="M 90,110 L 250,60"/>
    <path id="edge2" d="M 90,110 L 250,160"/>
    <path id="edge3" d="M 250,60 L 450,110"/>
    <path id="edge4" d="M 250,160 L 450,110"/>
    <path id="edge5" d="M 450,110 L 640,55"/>
    <path id="edge6" d="M 450,110 L 640,110"/>
    <path id="edge7" d="M 450,110 L 640,165"/>
    <path id="edge8" d="M 640,55 L 810,95"/>
    <path id="edge9" d="M 640,110 L 810,95"/>
    <path id="edge10" d="M 640,165 L 810,95"/>
  </g>

  <!-- ============ SIGNAL PULSES traveling along edges ============ -->
  <circle r="2.6" fill="#3DDC97" filter="url(#nodeGlow)">
    <animateMotion dur="3.4s" repeatCount="indefinite" path="M 90,110 L 250,60"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#58A6FF" filter="url(#nodeGlow)">
    <animateMotion dur="2.8s" begin="0.4s" repeatCount="indefinite" path="M 90,110 L 250,160"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#3DDC97" filter="url(#nodeGlow)">
    <animateMotion dur="2.6s" begin="0.9s" repeatCount="indefinite" path="M 250,60 L 450,110"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#A371F7" filter="url(#nodeGlow)">
    <animateMotion dur="3s" begin="1.2s" repeatCount="indefinite" path="M 250,160 L 450,110"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#3DDC97" filter="url(#nodeGlow)">
    <animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M 450,110 L 640,55"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#58A6FF" filter="url(#nodeGlow)">
    <animateMotion dur="2.4s" begin="0.2s" repeatCount="indefinite" path="M 450,110 L 640,110"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#3DDC97" filter="url(#nodeGlow)">
    <animateMotion dur="3.6s" begin="0.7s" repeatCount="indefinite" path="M 450,110 L 640,165"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.6s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#A371F7" filter="url(#nodeGlow)">
    <animateMotion dur="2.7s" begin="1.4s" repeatCount="indefinite" path="M 640,55 L 810,95"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.7s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#3DDC97" filter="url(#nodeGlow)">
    <animateMotion dur="2.9s" begin="0.5s" repeatCount="indefinite" path="M 640,110 L 810,95"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.9s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.6" fill="#58A6FF" filter="url(#nodeGlow)">
    <animateMotion dur="3.1s" begin="1.1s" repeatCount="indefinite" path="M 640,165 L 810,95"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.1s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- ============ NODES ============ -->
  <!-- Input / Perception node -->
  <circle cx="90" cy="110" r="14" fill="#0D1117" stroke="#3DDC97" stroke-width="1.6" filter="url(#nodeGlow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="110" r="4" fill="#3DDC97"/>
  <text x="90" y="145" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7D8590" letter-spacing="0.5">INPUT</text>

  <!-- Reasoning nodes -->
  <circle cx="250" cy="60" r="12" fill="#0D1117" stroke="#58A6FF" stroke-width="1.4" filter="url(#nodeGlow)"/>
  <circle cx="250" cy="60" r="3.4" fill="#58A6FF"/>
  <circle cx="250" cy="160" r="12" fill="#0D1117" stroke="#58A6FF" stroke-width="1.4" filter="url(#nodeGlow)"/>
  <circle cx="250" cy="160" r="3.4" fill="#58A6FF"/>
  <text x="250" y="195" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7D8590" letter-spacing="0.5">RETRIEVE</text>

  <!-- Central orchestrator (agent core) -->
  <circle cx="450" cy="110" r="18" fill="#0D1117" stroke="#3DDC97" stroke-width="2" filter="url(#nodeGlow)">
    <animate attributeName="r" values="16;19;16" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="110" r="5" fill="#3DDC97" filter="url(#nodeGlow)"/>
  <text x="450" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3DDC97" letter-spacing="0.5">AGENT CORE</text>

  <!-- Tool / action nodes -->
  <circle cx="640" cy="55" r="11" fill="#0D1117" stroke="#A371F7" stroke-width="1.4" filter="url(#nodeGlow)"/>
  <circle cx="640" cy="55" r="3" fill="#A371F7"/>
  <circle cx="640" cy="110" r="11" fill="#0D1117" stroke="#A371F7" stroke-width="1.4" filter="url(#nodeGlow)"/>
  <circle cx="640" cy="110" r="3" fill="#A371F7"/>
  <circle cx="640" cy="165" r="11" fill="#0D1117" stroke="#A371F7" stroke-width="1.4" filter="url(#nodeGlow)"/>
  <circle cx="640" cy="165" r="3" fill="#A371F7"/>
  <text x="640" y="195" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7D8590" letter-spacing="0.5">TOOLS</text>

  <!-- Output node -->
  <circle cx="810" cy="95" r="14" fill="#0D1117" stroke="#3DDC97" stroke-width="1.6" filter="url(#nodeGlow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.6s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="810" cy="95" r="4" fill="#3DDC97"/>
  <text x="810" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7D8590" letter-spacing="0.5">OUTPUT</text>

  <!-- Caption -->
  <text x="20" y="22" font-family="'Courier New', monospace" font-size="10" fill="#21262D" letter-spacing="1">// agentic reasoning loop — perceive · retrieve · decide · act · observe</text>
</svg>
