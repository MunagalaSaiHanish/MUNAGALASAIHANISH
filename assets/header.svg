<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161B22" stroke-width="0.8"/>
    </pattern>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#0D1117" rx="8"/>

  <!-- Subtle grid overlay -->
  <rect width="900" height="200" fill="url(#grid)" rx="8" opacity="0.5"/>

  <!-- Left vertical accent bar -->
  <rect x="0" y="0" width="3" height="200" fill="#3DDC97" rx="2"/>

  <!-- Top accent line with node points -->
  <line x1="3" y1="1" x2="897" y2="1" stroke="#21262D" stroke-width="1"/>
  <circle cx="60" cy="1" r="2.5" fill="#3DDC97"/>
  <circle cx="440" cy="1" r="2.5" fill="#3DDC97" opacity="0.5"/>
  <circle cx="820" cy="1" r="2.5" fill="#3DDC97" opacity="0.3"/>

  <!-- Status dot -->
  <circle cx="36" cy="40" r="4" fill="#3DDC97"/>
  <text x="46" y="44" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7D8590" letter-spacing="1">SYSTEM ONLINE</text>

  <!-- Main identity -->
  <text x="36" y="110" font-family="'Courier New', Courier, monospace" font-size="56" font-weight="700" fill="#E6EDF3" letter-spacing="-1" filter="url(#glow)">MUNAGALA SAI HANISH</text>
  <text x="340" y="110" font-family="'Courier New', Courier, monospace" font-size="56" font-weight="700" fill="#3DDC97" letter-spacing="-1" filter="url(#glow)">.AI</text>

  <!-- Cursor block -->
  <rect x="420" y="68" width="10" height="50" fill="#3DDC97" opacity="0.9"/>

  <!-- Tagline -->
  <text x="36" y="148" font-family="'Courier New', Courier, monospace" font-size="13" fill="#7D8590" letter-spacing="2">EMERGING AI ENGINEER</text>
  <text x="270" y="148" font-family="'Courier New', Courier, monospace" font-size="13" fill="#3DDC97" letter-spacing="2"> ·</text>
  <text x="290" y="148" font-family="'Courier New', Courier, monospace" font-size="13" fill="#7D8590" letter-spacing="2"> BUILDING INTELLIGENT SYSTEMS</text>

  <!-- Concept tags row -->
  <text x="36" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#58A6FF" letter-spacing="1.5">[ RAG </text>
  <text x="88" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#3DDC97" letter-spacing="1.5">·</text>
  <text x="100" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#58A6FF" letter-spacing="1.5"> LLMs </text>
  <text x="148" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#3DDC97" letter-spacing="1.5">·</text>
  <text x="160" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#58A6FF" letter-spacing="1.5"> RETRIEVAL </text>
  <text x="240" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#3DDC97" letter-spacing="1.5">·</text>
  <text x="252" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#58A6FF" letter-spacing="1.5"> MACHINE LEARNING </text>
  <text x="412" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#3DDC97" letter-spacing="1.5">·</text>
  <text x="424" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#58A6FF" letter-spacing="1.5"> VECTOR SEARCH </text>
  <text x="554" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#3DDC97" letter-spacing="1.5">·</text>
  <text x="566" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#58A6FF" letter-spacing="1.5"> PYTHON ]</text>

  <!-- Bottom accent line -->
  <line x1="3" y1="199" x2="897" y2="199" stroke="#21262D" stroke-width="1"/>

  <!-- Right corner decoration -->
  <text x="820" y="40" font-family="'Courier New', Courier, monospace" font-size="10" fill="#21262D">v2026.1</text>
</svg>
