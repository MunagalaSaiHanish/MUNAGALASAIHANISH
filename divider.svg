<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 28" width="900" height="28">
  <!-- Left line -->
  <line x1="0" y1="14" x2="390" y2="14" stroke="#21262D" stroke-width="1"/>

  <!-- Center node cluster -->
  <!-- Outer ring pulse -->
  <circle cx="450" cy="14" r="10" fill="none" stroke="#3DDC97" stroke-width="0.5">
    <animate attributeName="r"       values="8;14;8"  dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Left satellite -->
  <circle cx="420" cy="14" r="2" fill="#58A6FF">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Center hub -->
  <circle cx="450" cy="14" r="4.5" fill="none" stroke="#3DDC97" stroke-width="1.5">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="3.5;5.5;3.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="14" r="2" fill="#3DDC97">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Right satellite -->
  <circle cx="480" cy="14" r="2" fill="#3DDC97">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Right line -->
  <line x1="510" y1="14" x2="900" y2="14" stroke="#21262D" stroke-width="1"/>

  <!-- Traveling signals -->
  <!-- Left-to-right signal -->
  <circle r="2.5" fill="#3DDC97">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M0,14 L390,14"/>
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Right-to-left signal -->
  <circle r="2" fill="#58A6FF">
    <animateMotion dur="3.8s" repeatCount="indefinite" begin="1.9s" path="M900,14 L510,14"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="3.8s" repeatCount="indefinite" begin="1.9s"/>
  </circle>
  <!-- Slower secondary signal left-to-right -->
  <circle r="1.5" fill="#3DDC97">
    <animateMotion dur="5s" repeatCount="indefinite" begin="2.5s" path="M0,14 L390,14"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="5s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
</svg>
